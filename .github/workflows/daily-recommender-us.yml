name: Daily US Stock Recommender

on:
  schedule:
    # Target 17:00 ET (22:00 UTC). GitHub Actions sering delay ~2.5 jam,
    # jadi schedule 2.5 jam lebih awal: 19:30 UTC = 14:30 ET (setelah market close 16:00 ET)
    - cron: '30 19 * * 1-5'
  workflow_dispatch:  # bisa trigger manual dari GitHub UI

jobs:
  recommend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run US Stock Recommender
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main_us.py
